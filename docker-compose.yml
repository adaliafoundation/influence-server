services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --quiet --eval "try { rs.status().ok } catch(e) { 0 }" | grep -q 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_started
    restart: "no"
    entrypoint: ["bash", "/scripts/mongo-init-replica.sh"]
    volumes:
      - ./docker/mongo-init-replica.sh:/scripts/mongo-init-replica.sh:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  api:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      - NODE_ENV=docker
      - MONGO_URL=mongodb://mongo:27017/influence?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - GAME_MODE=${GAME_MODE:-hybrid}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - PORT=3001
      - API_SERVER=1
      - IMAGES_SERVER=0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TIME_ACCELERATION=${TIME_ACCELERATION:-}
      - MAX_ACTION_SECONDS=${MAX_ACTION_SECONDS:-}

  elastic-indexer:
    build: .
    command: ["node", "src/workers/elasticsearch.js"]
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    environment:
      - NODE_ENV=docker
      - MONGO_URL=mongodb://mongo:27017/influence?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - GAME_MODE=${GAME_MODE:-hybrid}
      - LOG_LEVEL=${LOG_LEVEL:-info}

  # Client dev server (start with: docker compose --profile client up -d)
  # First build takes several minutes for npm install. Rebuild with:
  #   docker compose --profile client build client
  client:
    profiles: ["client"]
    build:
      context: ${CLIENT_PATH:-../influence-client}
      dockerfile_inline: |
        FROM node:20-slim
        WORKDIR /app
        COPY package.json package-lock.json .npmrc ./
        COPY patches ./patches
        RUN npm install
        COPY . .
        EXPOSE 3000
        CMD ["npm", "start"]
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      - REACT_APP_GAMEMODE=hybrid
      - REACT_APP_STARKNET_CHAINID=0x534e5f4d41494e
      - REACT_APP_API_INFLUENCE=http://localhost:${PORT:-3001}

  # Chain-mode only workers (start with: docker compose --profile chain up -d)
  event-processor:
    build: .
    profiles: ["chain"]
    command: ["node", "src/workers/eventProcessor.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - NODE_ENV=docker
      - MONGO_URL=mongodb://mongo:27017/influence?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - GAME_MODE=${GAME_MODE:-chain}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - LOG_LEVEL=${LOG_LEVEL:-info}

volumes:
  mongo-data:
  redis-data:
  es-data:
